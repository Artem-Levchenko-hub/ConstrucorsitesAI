# landing.omniadevelop.ru — Omnia.AI landing v4 (HTTPS)

# HTTP → HTTPS redirect, keeps ACME challenge accessible for renewals
server {
    listen 80;
    listen [::]:80;
    server_name landing.omniadevelop.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/landing-omniadevelop;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name landing.omniadevelop.ru;

    ssl_certificate     /etc/nginx/ssl/landing.omniadevelop.ru/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/landing.omniadevelop.ru/priv.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # CTA handoff — survives redeploy of index.html. Adds the script
    # tag the SPA needs to load _omnia-cta.js, which intercepts CTA clicks.
    sub_filter_once on;
    sub_filter "</body>" "<script src=/_omnia-cta.js?v=2 defer></script></body>";


    root  /var/www/landing-omniadevelop;
    index index.html;

    # Hashed asset bundles — long cache
    location ~* \.(?:css|js|woff2?|svg|png|jpe?g|webp|avif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }

    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires -1;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires -1;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml text/html;
}
