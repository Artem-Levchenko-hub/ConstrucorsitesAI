# Production-style demo stack: web + api + worker + llm-gateway + postgres + redis + minio.
#
# Internal infra (postgres / redis / minio) stays on the docker network — only
# the three application containers expose host ports for nginx to reverse-proxy.
#
# Run on server:
#     cd /opt/omnia/apps/llm-gateway/deploy/full
#     cp .env.example .env  # then fill secrets
#     docker compose up -d --build
#
# Update after `git pull`:
#     docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: omnia-prod-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omnia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omnia}
      POSTGRES_DB: ${POSTGRES_DB:-omnia}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Bootstrap schema for the gateway tables (users, wallets, usage,
      # wallet_charges). Agent B's Alembic migrations layer the rest on top.
      - ../../init.sql:/docker-entrypoint-initdb.d/01-omnia-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omnia} -d ${POSTGRES_DB:-omnia}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - omnia-prod

  redis:
    image: redis:7-alpine
    container_name: omnia-prod-redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - omnia-prod

  minio:
    image: minio/minio:latest
    container_name: omnia-prod-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-omnia}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-omnia-minio-secret-please-change}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - omnia-prod

  minio-init:
    image: minio/mc:latest
    container_name: omnia-prod-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-omnia}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-omnia-minio-secret-please-change}
      MINIO_BUCKET_PROJECTS: ${MINIO_BUCKET_PROJECTS:-projects}
      MINIO_BUCKET_PREVIEWS: ${MINIO_BUCKET_PREVIEWS:-previews}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set m http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "m/$$MINIO_BUCKET_PROJECTS"
        mc mb --ignore-existing "m/$$MINIO_BUCKET_PREVIEWS"
        mc anonymous set download "m/$$MINIO_BUCKET_PREVIEWS"
        echo "MinIO buckets ready"
    restart: "no"
    networks:
      - omnia-prod

  gateway:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: omnia-gateway:prod
    container_name: omnia-prod-gw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      YANDEX_API_KEY: ${YANDEX_API_KEY:-}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GIGACHAT_AUTH_KEY: ${GIGACHAT_AUTH_KEY:-}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      GIGACHAT_VERIFY_SSL: ${GIGACHAT_VERIFY_SSL:-false}
      DATABASE_URL: postgresql://${POSTGRES_USER:-omnia}:${POSTGRES_PASSWORD:-omnia}@postgres:5432/${POSTGRES_DB:-omnia}
      REDIS_URL: redis://redis:6379/1
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gigachat-2}
      SAFETY_FILTER_ENABLED: ${SAFETY_FILTER_ENABLED:-true}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-3600}
      MIN_BALANCE_RUB: ${MIN_BALANCE_RUB:-5.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${GATEWAY_HOST_PORT:-8101}:8001"
    restart: unless-stopped
    networks:
      - omnia-prod

  api:
    build:
      context: ../../../api
      dockerfile: Dockerfile
    image: omnia-api:prod
    container_name: omnia-prod-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      ENV: prod
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-omnia}:${POSTGRES_PASSWORD:-omnia}@postgres:5432/${POSTGRES_DB:-omnia}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-omnia}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-omnia-minio-secret-please-change}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://constructor.lead-generator.ru/minio}
      MINIO_BUCKET_PROJECTS: ${MINIO_BUCKET_PROJECTS:-projects}
      MINIO_BUCKET_PREVIEWS: ${MINIO_BUCKET_PREVIEWS:-previews}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_COOKIE_SECURE: "true"
      LLM_GATEWAY_URL: http://gateway:8001
      MOCK_LLM: "false"
      CORS_ORIGINS: ${PUBLIC_ORIGIN:-https://constructor.lead-generator.ru}
      INITIAL_WALLET_BALANCE_RUB: ${INITIAL_WALLET_BALANCE_RUB:-100.0}
    ports:
      - "${API_HOST_PORT:-8200}:8000"
    restart: unless-stopped
    networks:
      - omnia-prod

  worker:
    build:
      context: ../../../api
      dockerfile: Dockerfile
    image: omnia-api:prod
    container_name: omnia-prod-worker
    command: ["uv", "run", "python", "-m", "omnia_api.workers.run"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      ENV: prod
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-omnia}:${POSTGRES_PASSWORD:-omnia}@postgres:5432/${POSTGRES_DB:-omnia}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-omnia}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-omnia-minio-secret-please-change}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://constructor.lead-generator.ru/minio}
      MINIO_BUCKET_PROJECTS: ${MINIO_BUCKET_PROJECTS:-projects}
      MINIO_BUCKET_PREVIEWS: ${MINIO_BUCKET_PREVIEWS:-previews}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
    restart: unless-stopped
    networks:
      - omnia-prod

  web:
    build:
      context: ../../../web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_ORIGIN:-https://constructor.lead-generator.ru}
        NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_ORIGIN:-wss://constructor.lead-generator.ru}
        NEXT_PUBLIC_USE_MOCKS: "false"
    image: omnia-web:prod
    container_name: omnia-prod-web
    environment:
      NEXTAUTH_URL: ${PUBLIC_ORIGIN:-https://constructor.lead-generator.ru}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET in .env}
      NODE_ENV: production
    ports:
      - "${WEB_HOST_PORT:-3100}:3000"
    restart: unless-stopped
    networks:
      - omnia-prod

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  omnia-prod:
    driver: bridge
