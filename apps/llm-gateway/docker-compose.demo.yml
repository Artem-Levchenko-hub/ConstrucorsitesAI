# Standalone gateway demo stack — Postgres + Redis + gateway.
# Lives inside apps/llm-gateway/ so it doesn't fight with infra/docker-compose.yml
# (agent B's full stack: api + worker + minio + ...).
#
# Usage on the server:
#     cd apps/llm-gateway
#     cp .env.example .env       # then fill GIGACHAT_AUTH_KEY (and any other provider keys)
#     docker compose -f docker-compose.demo.yml up -d --build
#     curl http://localhost:8001/health
#     curl http://localhost:8001/v1/models | jq

services:
  postgres:
    image: postgres:16-alpine
    container_name: omnia-gw-postgres
    environment:
      POSTGRES_USER: omnia
      POSTGRES_PASSWORD: omnia
      POSTGRES_DB: omnia
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # init.sql is applied on first container start (when the data volume is empty).
      - ./init.sql:/docker-entrypoint-initdb.d/01-omnia-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnia -d omnia"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - gw-net

  redis:
    image: redis:7-alpine
    container_name: omnia-gw-redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - gw-net

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: omnia-gateway:demo
    container_name: omnia-gw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override URLs to point at the in-compose services regardless of what's in .env.
      DATABASE_URL: postgresql://omnia:omnia@postgres:5432/omnia
      REDIS_URL: redis://redis:6379/1
      LOG_LEVEL: INFO
    ports:
      - "8001:8001"
    restart: unless-stopped
    networks:
      - gw-net

volumes:
  postgres-data:
  redis-data:

networks:
  gw-net:
    driver: bridge
