<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Блог</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-slate-900 font-serif">
  <header class="border-b">
    <div class="max-w-3xl mx-auto px-6 py-6">
      <h1 class="text-3xl font-bold">Название блога</h1>
      <p class="text-slate-600 text-sm mt-1">Заметки и наблюдения</p>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-6 py-12 space-y-12">
    <article>
      <h2 class="text-2xl font-bold mb-2">
        <a href="#" class="hover:text-indigo-600">Первая запись</a>
      </h2>
      <p class="text-slate-500 text-sm mb-4">4 мая 2026</p>
      <p class="text-slate-800 leading-relaxed">
        Здесь будет первый пост. Замени его своим контентом — расскажи, о чём этот блог.
      </p>
    </article>

    <article>
      <h2 class="text-2xl font-bold mb-2">
        <a href="#" class="hover:text-indigo-600">Вторая запись</a>
      </h2>
      <p class="text-slate-500 text-sm mb-4">3 мая 2026</p>
      <p class="text-slate-800 leading-relaxed">
        Ещё один пример поста. Поддерживается markdown — пиши свободно.
      </p>
    </article>
  </main>

  <footer class="border-t mt-16 py-8 text-center text-slate-500 text-sm">
    <p>&copy; 2026 · Сделано на Omnia.AI</p>
  </footer>
</body>
</html>
