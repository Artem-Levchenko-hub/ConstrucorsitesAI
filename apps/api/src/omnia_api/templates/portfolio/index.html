<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Портфолио</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-slate-900 font-sans">
  <main class="max-w-4xl mx-auto px-6 py-16">
    <header class="mb-16">
      <h1 class="text-5xl font-bold mb-2">Имя Фамилия</h1>
      <p class="text-xl text-slate-600">Дизайнер · Разработчик · Создатель</p>
    </header>

    <section class="mb-16">
      <h2 class="text-2xl font-bold mb-6">Обо мне</h2>
      <p class="text-slate-700 leading-relaxed">
        Несколько предложений, которые расскажут, кто вы и над чем сейчас работаете.
      </p>
    </section>

    <section class="mb-16">
      <h2 class="text-2xl font-bold mb-6">Работы</h2>
      <div class="grid md:grid-cols-2 gap-6">
        <article class="bg-slate-50 p-6 rounded-xl">
          <h3 class="font-bold mb-1">Проект 1</h3>
          <p class="text-slate-600 text-sm">Краткое описание</p>
        </article>
        <article class="bg-slate-50 p-6 rounded-xl">
          <h3 class="font-bold mb-1">Проект 2</h3>
          <p class="text-slate-600 text-sm">Краткое описание</p>
        </article>
      </div>
    </section>

    <footer class="border-t pt-8 text-slate-500 text-sm">
      <p>Связаться: <a href="mailto:hello@example.com" class="text-indigo-600 hover:underline">hello@example.com</a></p>
    </footer>
  </main>
</body>
</html>
